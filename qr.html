  .ecg path{stroke:var(--crimson);stroke-width:2.2;fill:none;stroke-linejoin:round;stroke-linecap:round}

  .scan{font-family:var(--mono);font-size:11px;letter-spacing:.2em;color:var(--amber);text-transform:uppercase;margin-top:20px}
  .tag{font-family:var(--display);font-style:italic;font-size:19px;color:var(--cream);margin-top:12px;line-height:1.3}
